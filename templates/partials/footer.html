<footer class="site-footer">
  <nav aria-label="{{ trans(key='nav_social', lang=lang) }}">
    {% for media in config.extra.social_links %}
      <a href="{{ media.url }}">{{ media.name }}</a>
      {% if not loop.last %}
        <span aria-hidden="true">&ThinSpace;·&ThinSpace;</span>
      {% endif %}
    {% endfor %}
  </nav>
  <p>© {{ now() | date(format="%Y") }} {{ config.author }}</p>
</footer>
